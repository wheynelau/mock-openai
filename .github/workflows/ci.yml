name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo fmt --check
      - run: cargo check
      - run: cargo clippy --all-features -- -D warnings -W clippy::perf
      - run: cargo test
        env:
          HF_HOME: ${{ github.workspace }}/.hf-cache
